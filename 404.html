<!DOCTYPE html>
<html lang="fr">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Page introuvable — WeCare Dental Clinic</title>
  <meta name="robots" content="noindex, nofollow">
  <meta name="theme-color" content="#FFFFFF">

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

  <link href="https://fonts.googleapis.com/css2?family=Source+Serif+4:ital,opsz,wght@0,8..60,300..600;1,8..60,300..600&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

  <link rel="stylesheet" href="/assets/css/variables.css">
  <link rel="stylesheet" href="/assets/css/global.css">
  <link rel="stylesheet" href="/assets/css/components.css">

  <style>
    .error-page {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 60vh;
      text-align: center;
      padding: var(--space-16) var(--space-6);
    }
    .error-code {
      font-family: var(--font-display);
      font-size: clamp(4rem, 10vw, 8rem);
      font-weight: 300;
      color: var(--color-border);
      line-height: 1;
      margin-bottom: var(--space-4);
    }
    .error-page h1 {
      font-family: var(--font-display);
      font-size: clamp(1.5rem, 3vw, 2rem);
      font-weight: 400;
      color: var(--color-text);
      margin-bottom: var(--space-4);
    }
    .error-page p {
      color: var(--color-text-muted);
      max-width: 45ch;
      margin-bottom: var(--space-8);
    }
  </style>
</head>

<body data-root="" data-page="404.html">

  <!-- NAV -->
  <div id="nav-placeholder"></div>
  <div class="nav-spacer"></div>

  <main class="error-page">
    <div class="error-code">404</div>
    <h1>Page introuvable</h1>
    <p>La page que vous cherchez n'existe pas ou a été déplacée.</p>
    <a href="/" class="btn btn-primary">Retour à l'accueil</a>
  </main>

  <!-- FOOTER -->
  <div id="footer-placeholder"></div>

  <script src="/assets/js/nav.js"></script>
  <script src="/assets/js/footer.js"></script>
  <script src="/assets/js/main.js" defer></script>
</body>
</html>
